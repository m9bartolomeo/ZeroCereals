name: Sync KB + Deploy

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SHEET_ID: 1LGNkmM3K-iVwqJ5sRYe0zeIQZEQBZTfTCyVIf4BaZfQ

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Export Sheet to JSON
        run: python scripts/sync_kb.py

      - name: Deploy JSON + app to Netsons via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          protocol: ftps
          port: 21
          security: loose
          exclude: |
            **/.git*
            **/.git*/**

      - name: Trigger import JSON → MySQL
        env:
          HTTP_USER: ${{ secrets.HTTP_USER }}
          HTTP_PASS: ${{ secrets.HTTP_PASS }}
          IMPORT_KEY: ${{ secrets.IMPORT_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, base64, sys, os
          url  = 'https://rd.metodonove.com/api.php?action=import'
          user = os.environ['HTTP_USER']
          pwd  = os.environ['HTTP_PASS']
          key  = os.environ['IMPORT_KEY']
          creds = base64.b64encode(f'{user}:{pwd}'.encode()).decode()
          req = urllib.request.Request(url, method='POST')
          req.add_header('X-Import-Key', key)
          req.add_header('Authorization', f'Basic {creds}')
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  body = r.read().decode()
                  print('Raw response:', body[:200])
                  data = json.loads(body)
                  print('Import result:', json.dumps(data, indent=2))
                  sys.exit(0 if data.get('status') == 'ok' else 1)
          except Exception as e:
              print('Error:', e)
              sys.exit(1)
          PYEOF
