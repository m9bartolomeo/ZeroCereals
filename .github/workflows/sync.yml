name: Sync KB + Deploy

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SHEET_ID: 1LGNkmM3K-iVwqJ5sRYe0zeIQZEQBZTfTCyVIf4BaZfQ

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Export Sheet to JSON
        run: python scripts/sync_kb.py

      - name: Deploy JSON + app to Netsons via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          protocol: ftps
          port: 21
          security: loose
          timeout: 120000
          passive: true
          exclude: |
            **/.git*
            **/.git*/**

      - name: Trigger import JSON → MySQL
        env:
          HTTP_USER: ${{ secrets.HTTP_USER }}
          HTTP_PASS: ${{ secrets.HTTP_PASS }}
          IMPORT_KEY: ${{ secrets.IMPORT_KEY }}
        run: python3 scripts/trigger_import.py
